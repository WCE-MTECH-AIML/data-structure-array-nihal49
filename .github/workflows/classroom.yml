name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: 'array sum test '
      id: array-sum-test
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'array sum test '
        setup-command: chmod+x array.sh
        command: "./array.sh"
        input: |-
          5
          12 3 4 5
        expected-output: '15'
        comparison-method: regex
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        ARRAY-SUM-TEST_RESULTS: "${{steps.array-sum-test.outputs.result}}"
      with:
        runners: array-sum-test
